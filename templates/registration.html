{% extends "base_public.html" %}
{% block content %}
  <div class="card">
    <h1>Create account</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Create account</button>
    </form>
    <p class="muted">
      Already have an account?
      <a href="{% url 'login' %}">Log in</a>
    </p>
  </div>
{% endblock %}
