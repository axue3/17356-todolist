{% extends "base_public.html" %}
{% block content %}
  <div class="card">
    <h1>Log in</h1>
    <form method="post" class="form">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">Log in</button>
    </form>
    <p class="muted">
      New here?
      <a href="{% url 'register' %}">Create an account</a>
    </p>
  </div>
{% endblock %}
